<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finance Quest">
<meta name="theme-color" content="#0a0a0f">
<title>Finance Quest</title>
<style>
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--border:#2a2a3d;--bhi:#3d3d5c;--text:#e8e8f0;--muted:#6b6b8a;--dim:#4a4a6a;--green:#00ff9d;--blue:#00b4ff;--purple:#b060ff;--red:#ff4560;--amber:#ffb830;--gd:rgba(0,255,157,.12);--bd:rgba(0,180,255,.12);--rd:rgba(255,69,96,.12);--ad:rgba(255,184,48,.12);--pd:rgba(176,96,255,.12);--r:11px;--font:system-ui,sans-serif;--mono:monospace;--sbot:env(safe-area-inset-bottom,0px);--stop:env(safe-area-inset-top,0px);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;flex-direction:column;max-width:430px;margin:0 auto;}
#pinScreen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#pinScreen.gone{display:none;}
.pin-logo{font-family:var(--mono);font-size:20px;color:var(--green);letter-spacing:.15em;margin-bottom:4px;}
.pin-sub{font-size:11px;color:var(--muted);margin-bottom:28px;font-family:var(--mono);text-align:center;}
.pin-dots{display:flex;gap:14px;margin-bottom:26px;}
.pd{width:14px;height:14px;border-radius:50%;border:2px solid var(--bhi);background:transparent;transition:all .15s;}
.pd.on{background:var(--green);border-color:var(--green);}
.pd.er{background:var(--red);border-color:var(--red);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;width:230px;}
.pk{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:17px;font-size:20px;font-weight:600;cursor:pointer;color:var(--text);font-family:var(--mono);text-align:center;-webkit-tap-highlight-color:transparent;}
.pk:active{background:var(--bg3);transform:scale(.93);}
.pk.ghost{background:transparent;border:none;pointer-events:none;}
.pin-err{font-size:11px;font-family:var(--mono);color:var(--red);height:16px;margin-top:14px;text-align:center;}
.pin-reset{font-size:10px;color:var(--dim);margin-top:18px;cursor:pointer;text-decoration:underline;font-family:var(--mono);}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.shake{animation:shake .35s ease;}
#app{display:none;flex-direction:column;height:100%;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;padding-top:calc(10px + var(--stop));border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;}
.logo{font-family:var(--mono);font-size:12px;color:var(--green);letter-spacing:.1em;}
.logo-sub{font-size:9px;color:var(--muted);margin-top:1px;}
.hdr-r{display:flex;align-items:center;gap:6px;}
.lvl-b{background:var(--gd);border:1px solid var(--green);border-radius:4px;padding:3px 8px;font-family:var(--mono);font-size:9px;color:var(--green);}
.hdr-icon{width:28px;height:28px;background:none;border:1px solid var(--bhi);border-radius:6px;cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 13px calc(72px + var(--sbot));}
::-webkit-scrollbar{width:2px;}::-webkit-scrollbar-thumb{background:var(--bhi);border-radius:2px;}
.bnav{display:flex;background:var(--bg2);border-top:1px solid var(--border);padding:4px 0;padding-bottom:calc(4px + var(--sbot));flex-shrink:0;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 1px;cursor:pointer;border:none;background:none;color:var(--muted);min-width:0;-webkit-tap-highlight-color:transparent;}
.nb .ni{font-size:18px;line-height:1;}
.nb .nl{font-size:7px;font-family:var(--mono);text-transform:uppercase;white-space:nowrap;}
.nb.active{color:var(--green);}
.sh{display:flex;align-items:center;justify-content:space-between;margin:16px 0 9px;}
.st{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.ab{font-size:10px;font-family:var(--mono);padding:4px 9px;border-radius:5px;cursor:pointer;border:none;font-weight:600;-webkit-tap-highlight-color:transparent;}
.ag{background:var(--gd);color:var(--green);border:1px solid rgba(0,255,157,.3);}
.ab2{background:var(--bd);color:var(--blue);border:1px solid rgba(0,180,255,.3);}
.ar{background:var(--rd);color:var(--red);border:1px solid rgba(255,69,96,.3);}
.ap{background:var(--pd);color:var(--purple);border:1px solid rgba(176,96,255,.3);}
.aa{background:var(--ad);color:var(--amber);border:1px solid rgba(255,184,48,.3);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:10px;}
.ibar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:10px;}
.irow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border);}
.irow:last-child{border-bottom:none;}
.ilbl{color:var(--muted);}
.ival{font-family:var(--mono);font-weight:600;}
.ival.pl{color:var(--green);}.ival.mn{color:var(--red);}.ival.hi{color:var(--blue);font-size:14px;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.sb2{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:11px;}
.sb2-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-family:var(--mono);margin-bottom:3px;}
.sb2-v{font-family:var(--mono);font-size:17px;font-weight:700;}
.sb2-s{font-size:10px;color:var(--muted);margin-top:2px;}
.pcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-top:13px;margin-bottom:12px;position:relative;overflow:hidden;}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),var(--blue));}
.pname{font-size:18px;font-weight:700;margin-bottom:1px;}
.pcls{font-family:var(--mono);font-size:9px;color:var(--blue);letter-spacing:.07em;margin-bottom:11px;}
.srow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:11px;}
.sbox{background:var(--bg3);border-radius:8px;padding:9px 5px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.sbox-l{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.sbox-v{font-family:var(--mono);font-size:14px;font-weight:700;}
.sbox-h{font-size:8px;color:var(--dim);margin-top:2px;}
.cg{color:var(--green);}.cr{color:var(--red);}.cb{color:var(--blue);}.ca{color:var(--amber);}.cp{color:var(--purple);}
.xrow{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;}
.xrow span:last-child{font-family:var(--mono);color:var(--green);}
.xtrack{background:var(--bg3);border-radius:3px;height:7px;overflow:hidden;margin-bottom:8px;}
.xfill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1);}
.xg{background:linear-gradient(90deg,#00c97a,var(--green));}.xb{background:linear-gradient(90deg,#0077cc,var(--blue));}.xr{background:linear-gradient(90deg,#cc2040,var(--red));}.xa{background:linear-gradient(90deg,#cc8800,var(--amber));}.xp{background:linear-gradient(90deg,#7030cc,var(--purple));}
.dcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:9px;position:relative;overflow:hidden;}
.dcard.cleared{opacity:.45;border-color:var(--green);}
.dcard.cleared::after{content:'CLEARED';position:absolute;top:50%;right:12px;transform:translateY(-50%);font-family:var(--mono);font-size:10px;color:var(--green);}
.dpri{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;margin-bottom:6px;display:inline-block;}
.p1{background:var(--rd);color:var(--red);border:1px solid rgba(255,69,96,.3);}
.p2{background:var(--ad);color:var(--amber);border:1px solid rgba(255,184,48,.3);}
.p3{background:var(--bd);color:var(--blue);border:1px solid rgba(0,180,255,.3);}
.px{background:var(--pd);color:var(--purple);border:1px solid rgba(176,96,255,.3);}
.dname{font-size:14px;font-weight:600;margin-bottom:2px;}
.dmeta{font-size:10px;color:var(--muted);margin-bottom:8px;font-family:var(--mono);}
.damts{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px;}
.dbal{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--red);}
.dbal.cv{color:var(--green);}
.drt{text-align:right;}
.dint{font-size:10px;color:var(--muted);margin-bottom:1px;}
.ddue{font-size:10px;font-family:var(--mono);color:var(--amber);}
.dacts{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;}
.bitem{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;}
.bitem.paid{opacity:.4;border-color:var(--green);}
.bleft{display:flex;align-items:center;gap:9px;}
.bico{width:33px;height:33px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.bname{font-size:12px;font-weight:500;}
.bdate{font-size:10px;color:var(--muted);font-family:var(--mono);}
.bright{display:flex;align-items:center;gap:5px;}
.bamt{font-family:var(--mono);font-size:13px;font-weight:700;}
.btog{width:26px;height:26px;border-radius:50%;border:2px solid var(--bhi);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s;color:var(--muted);-webkit-tap-highlight-color:transparent;}
.btog.ck{background:var(--green);border-color:var(--green);color:#0a0a0f;}
.ib{width:26px;height:26px;border-radius:6px;border:1px solid var(--bhi);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);-webkit-tap-highlight-color:transparent;}
.gcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:9px;}
.ghead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.gname{font-size:13px;font-weight:600;}
.gpct{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green);}
.gamts{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--mono);}
.gbtns{display:flex;gap:6px;margin-top:8px;}
.pitem{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:7px;display:flex;gap:9px;}
.pitem.done{opacity:.45;}
.pnum{width:21px;height:21px;border-radius:50%;background:var(--pd);border:1px solid rgba(176,96,255,.3);color:var(--purple);font-family:var(--mono);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.pnum.dn{background:var(--gd);border-color:rgba(0,255,157,.3);color:var(--green);}
.ptxt{flex:1;min-width:0;}
.ptxt strong{display:block;font-size:12px;font-weight:600;margin-bottom:2px;}
.ptxt span{font-size:11px;color:var(--muted);line-height:1.4;}
.pbtns{display:flex;gap:5px;margin-top:7px;}
.pmeta{text-align:right;flex-shrink:0;}
.pdate{font-family:var(--mono);font-size:9px;color:var(--amber);white-space:nowrap;}
.pdot{width:8px;height:8px;border-radius:50%;margin-top:5px;margin-left:auto;}
.txn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;gap:9px;}
.txn-ico{width:33px;height:33px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.txn-info{flex:1;min-width:0;}
.txn-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.txn-meta{font-size:10px;color:var(--muted);font-family:var(--mono);}
.txn-amt{font-family:var(--mono);font-size:13px;font-weight:700;white-space:nowrap;}
.txn-amt.inc{color:var(--green);}.txn-amt.exp{color:var(--red);}
.txn-del{width:22px;height:22px;border-radius:5px;border:1px solid var(--bhi);background:transparent;cursor:pointer;font-size:10px;color:var(--muted);flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.acct{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;}
.acct-l{display:flex;align-items:center;gap:9px;}
.acct-ico{width:33px;height:33px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.acct-name{font-size:12px;font-weight:600;}
.acct-type{font-size:9px;color:var(--muted);font-family:var(--mono);}
.acct-bal{font-family:var(--mono);font-size:15px;font-weight:700;}
.cats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:11px;}
.cpill{padding:5px 10px;border-radius:20px;border:1px solid var(--bhi);background:transparent;color:var(--muted);font-size:10px;font-family:var(--font);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.cpill.on{background:var(--green);color:#0a0a0f;border-color:var(--green);font-weight:600;}
.sett{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.sett:last-child{border-bottom:none;}
.sett-l{font-size:13px;font-weight:500;}
.sett-s{font-size:10px;color:var(--muted);margin-top:2px;}
.sett-ch{color:var(--muted);font-size:14px;}
.tog{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.tog.on{background:var(--green);}.tog.off{background:var(--bhi);}
.tog::after{content:'';position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;}
.tog.on::after{left:21px;}.tog.off::after{left:3px;}
.danger{background:var(--rd);border:1px solid rgba(255,69,96,.3);border-radius:var(--r);padding:13px;margin-top:12px;}
.btn{padding:8px 11px;border-radius:7px;border:none;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:4px;-webkit-tap-highlight-color:transparent;}
.btn:active{opacity:.8;transform:scale(.97);}
.btn-g{background:var(--green);color:#0a0a0f;}.btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--bhi);}.btn-r{background:var(--red);color:#fff;}.btn-a{background:var(--amber);color:#0a0a0f;}.btn-b{background:var(--blue);color:#0a0a0f;}.btn-p{background:var(--purple);color:#fff;}
.btn-full{width:100%;padding:11px;}.btn-sm{padding:5px 9px;font-size:11px;}
.btn-del{background:transparent;color:var(--red);border:1px solid rgba(255,69,96,.3);font-size:11px;padding:5px 9px;border-radius:6px;cursor:pointer;font-family:var(--font);font-weight:600;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.87);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
.ov.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--bhi);border-radius:18px 18px 0 0;padding:16px 15px;padding-bottom:calc(16px + var(--sbot));width:100%;max-width:430px;transform:translateY(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);max-height:88vh;overflow-y:auto;}
.ov.open .modal{transform:translateY(0);}
.mhandle{width:34px;height:4px;background:var(--bhi);border-radius:2px;margin:0 auto 13px;}
.mtitle{font-size:15px;font-weight:700;margin-bottom:13px;}
.fg{margin-bottom:10px;}
.fl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;display:block;}
.fi,.fs{width:100%;background:var(--bg3);border:1px solid var(--bhi);border-radius:7px;padding:9px 11px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;-webkit-appearance:none;appearance:none;}
.fi:focus,.fs:focus{border-color:var(--green);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.macts{display:flex;gap:7px;margin-top:12px;}
.fi-ta{width:100%;background:var(--bg3);border:1px solid var(--bhi);border-radius:7px;padding:9px 11px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;resize:vertical;min-height:70px;}
.fi-ta:focus{border-color:var(--green);}
.toast{position:fixed;bottom:calc(66px + var(--sbot));left:50%;transform:translateX(-50%) translateY(14px);background:var(--bg2);border:1px solid var(--green);border-radius:10px;padding:9px 14px;font-size:11px;color:var(--green);font-family:var(--mono);z-index:500;opacity:0;transition:opacity .3s,transform .3s cubic-bezier(.16,1,.3,1);white-space:nowrap;max-width:88vw;text-align:center;pointer-events:none;display:flex;align-items:center;gap:8px;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all;}
.toast.err{border-color:var(--red);color:var(--red);}
.tx{cursor:pointer;opacity:.7;font-size:12px;}
.empty{text-align:center;padding:26px 14px;font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.7;}
.empty strong{color:var(--text);font-size:12px;display:block;margin-bottom:5px;}
.ach-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.ach-item.earned{border-color:var(--green);}
.util-bar{background:var(--bg2);border-radius:var(--r);padding:12px;margin-bottom:10px;}
</style>
</head>
<body>
<div id="pinScreen">
  <div class="pin-logo">&#9889; FINANCE QUEST</div>
  <div class="pin-sub" id="pinSub">ENTER PIN</div>
  <div class="pin-dots" id="pinDots">
    <div class="pd" id="pd0"></div><div class="pd" id="pd1"></div>
    <div class="pd" id="pd2"></div><div class="pd" id="pd3"></div>
  </div>
  <div class="pin-grid">
    <button class="pk" onclick="pinKey('1')">1</button>
    <button class="pk" onclick="pinKey('2')">2</button>
    <button class="pk" onclick="pinKey('3')">3</button>
    <button class="pk" onclick="pinKey('4')">4</button>
    <button class="pk" onclick="pinKey('5')">5</button>
    <button class="pk" onclick="pinKey('6')">6</button>
    <button class="pk" onclick="pinKey('7')">7</button>
    <button class="pk" onclick="pinKey('8')">8</button>
    <button class="pk" onclick="pinKey('9')">9</button>
    <button class="pk ghost"></button>
    <button class="pk" onclick="pinKey('0')">0</button>
    <button class="pk" onclick="pinDel()">&#9003;</button>
  </div>
  <div class="pin-err" id="pinErr"></div>
  <div class="pin-reset" onclick="pinReset()">Forgot PIN?</div>
</div>
<div id="app">
  <div class="hdr">
    <div><div class="logo">&#9889; FINANCE QUEST</div><div class="logo-sub">Your Money HUD</div></div>
    <div class="hdr-r">
      <div class="lvl-b" id="lvlBadge">LVL 1</div>
      <button class="hdr-icon" onclick="go('settings')">&#9881;&#65039;</button>
    </div>
  </div>
  <div class="scroll" id="scroll"><div id="main"></div></div>
  <nav class="bnav">
    <button class="nb active" id="nb-hud" onclick="go('hud')"><span class="ni">&#9889;</span><span class="nl">HUD</span></button>
    <button class="nb" id="nb-debts" onclick="go('debts')"><span class="ni">&#9876;&#65039;</span><span class="nl">Debts</span></button>
    <button class="nb" id="nb-bills" onclick="go('bills')"><span class="ni">&#128257;</span><span class="nl">Bills</span></button>
    <button class="nb" id="nb-money" onclick="go('money')"><span class="ni">&#128176;</span><span class="nl">Money</span></button>

<script>
// ============================================================

// All strings use concatenation only
// ============================================================

// ── STATE ──
var S = {};
var _tab='hud', _txnType='expense', _filterCat='all';
var _editDebtId=null, _editBillId=null, _editGoalId=null, _editPlanId=null;
var _payDebtId=null, _chargeDebtId=null, _goalDepId=null, _updAcctId=null;
var _toastTimer=null, _lockTimer=null, _pinBuf='';

// ── DEFAULT DATA ──
var DEF = {

  ],
  goals:[
    {id:1,name:'Apartment Fund',cur:0,tgt:4500,date:'2025-09-01',col:'xb'},
    {id:2,name:'Car Down Payment',cur:0,tgt:3000,date:'2025-10-01',col:'xp'},
    {id:3,name:'Emergency Fund',cur:0,tgt:1000,date:'2025-12-01',col:'xg'}
  ],
  planItems:[
    {id:1,title:'Pay 2 cards same day - Jul 8',desc:'Savor min $25 first. Then wipe Quicksilver ($500) + Credit One ($462). Do it the moment the check hits.',date:'JUL 8',pri:'high',done:false},
    {id:2,title:'Cancel Todolist double charge',desc:'Paying $10/mo for a duplicate. Use Google Tasks - free.',date:'NOW',pri:'high',done:false},
    {id:3,title:'Pause Amazon Prime',desc:'$14.99/mo. Amazon > Account > Prime > Pause. Reactivate after apartment.',date:'NOW',pri:'high',done:false},
    {id:4,title:'Wipe Capital One Savor - Jul 22',desc:'Pay $1,007 + ~$10 interest. All 3 cards = $0. Score climbs.',date:'JUL 22',pri:'high',done:false},
    {id:5,title:'List the F-150 for sale',desc:'FB Marketplace, Craigslist, CarGurus. Every week it sits = money lost.',date:'NOW',pri:'high',done:false},
    {id:6,title:'Pull your free credit report',desc:'AnnualCreditReport.com. One disputed error = +20-40 pts.',date:'NOW',pri:'medium',done:false},
    {id:7,title:'Aug 8 - pure savings mode',desc:'Zero debt. Stack $1,500+/paycheck toward apartment. Target $4,500 by Sept.',date:'AUG 8',pri:'high',done:false},
    {id:8,title:'Keep cards open at $0',desc:'Do NOT close Quicksilver or Savor after payoff. History = points.',date:'JUL 22+',pri:'medium',done:false},
    {id:9,title:'Research move states',desc:'TX, FL, TN - no state income tax. $4K/mo goes much further.',date:'ONGOING',pri:'medium',done:false},
    {id:10,title:'Buy car after score hits 680+',desc:'Sell truck first. Every 20 pts = better APR = hundreds saved.',date:'SEPT+',pri:'low',done:false}
  ],
  transactions:[], accounts:[
    {id:1,name:'Checking',type:'checking',bal:0,icon:'bank',linkedDebtId:null},
    {id:2,name:'Quicksilver',type:'credit',bal:-500,icon:'card',linkedDebtId:1},
    {id:3,name:'Credit One',type:'credit',bal:-462,icon:'card',linkedDebtId:2},
    {id:4,name:'Savor',type:'credit',bal:-1007,icon:'card',linkedDebtId:3}
  ],
  achievements:[]
};

// ── STORAGE ──
function lSave(){try{localStorage.setItem('fq6',JSON.stringify(S));}catch(e){}}
function lLoad(){
  try{
    var d=localStorage.getItem('fq6');
    if(d){S=JSON.parse(d);}else{S=JSON.parse(JSON.stringify(DEF));}
    if(!S.transactions)S.transactions=[];
    if(!S.accounts)S.accounts=JSON.parse(JSON.stringify(DEF.accounts));
    if(!S.planItems)S.planItems=JSON.parse(JSON.stringify(DEF.planItems));
    if(!S.goals)S.goals=JSON.parse(JSON.stringify(DEF.goals));
    if(!S.debts)S.debts=JSON.parse(JSON.stringify(DEF.debts));
    if(!S.bills)S.bills=JSON.parse(JSON.stringify(DEF.bills));
    if(!S.achievements)S.achievements=[];
    if(S.autoLock===undefined)S.autoLock=true;
    if(!S.lockMins)S.lockMins=5;
  }catch(e){S=JSON.parse(JSON.stringify(DEF));}
}

// ── SYNC: debt is master, accounts mirror ──
function masterSync(){
  S.debts.forEach(function(d){
    var linked=S.accounts.find(function(a){return a.linkedDebtId===d.id;});
    if(linked){linked.bal=+(- d.bal).toFixed(2);}
  });
}
function save(){masterSync();lSave();}

// ── PIN ──
var PK='fq_pin';
function getPin(){return localStorage.getItem(PK)||'1234';}
function pinKey(k){
  if(_pinBuf.length>=4)return;
  _pinBuf+=k;
  updatePinDots();
  if(_pinBuf.length===4)setTimeout(checkPin,150);
}
function pinDel(){
  if(_pinBuf.length>0){_pinBuf=_pinBuf.slice(0,-1);updatePinDots();}
}
function updatePinDots(){
  for(var i=0;i<4;i++){
    var d=document.getElementById('pd'+i);
    if(d)d.className='pd'+(i<_pinBuf.length?' on':'');
  }
}
function checkPin(){
  if(_pinBuf===getPin()){
    unlockApp();
  }else{
    document.getElementById('pinErr').textContent='Incorrect PIN';
    for(var i=0;i<4;i++){var d=document.getElementById('pd'+i);if(d)d.className='pd er';}
    var dots=document.getElementById('pinDots');
    if(dots){dots.classList.add('shake');setTimeout(function(){dots.classList.remove('shake');},400);}
    setTimeout(function(){_pinBuf='';updatePinDots();document.getElementById('pinErr').textContent='';},900);
  }
}
function unlockApp(){
  document.getElementById('pinScreen').classList.add('gone');
  document.getElementById('app').style.display='flex';
  render();
  resetLock();
}
function lockApp(){
  _pinBuf='';updatePinDots();
  document.getElementById('pinScreen').classList.remove('gone');
  document.getElementById('app').style.display='none';
}
function resetLock(){
  if(!S.autoLock)return;
  clearTimeout(_lockTimer);
  _lockTimer=setTimeout(lockApp,(S.lockMins||5)*60*1000);
}
function pinReset(){
  var ans=prompt('Enter your name to reset PIN:');
  if(ans&&ans.toLowerCase().trim()===S.name.toLowerCase().trim()){
    localStorage.removeItem(PK);
    document.getElementById('pinSub').textContent='RESET - USE: 1234';
    toast('PIN reset to 1234');
  }else{toast('Name did not match','err');}
}
function doChangePin(){
  var old=document.getElementById('pin-old').value;
  var nw=document.getElementById('pin-new').value;
  var cf=document.getElementById('pin-cf').value;
  if(old!==getPin()){toast('Current PIN incorrect','err');return;}
  if(nw.length!==4||!/^\d{4}$/.test(nw)){toast('PIN must be 4 digits','err');return;}
  if(nw!==cf){toast('PINs do not match','err');return;}
  localStorage.setItem(PK,nw);
  closeM('pin');
  ['pin-old','pin-new','pin-cf'].forEach(function(id){document.getElementById(id).value='';});
  toast('PIN updated!');
}
document.addEventListener('touchstart',function(){if(document.getElementById('app').style.display!=='none')resetLock();},{passive:true});
document.addEventListener('click',function(){if(document.getElementById('app').style.display!=='none')resetLock();});

// ── NAVIGATION ──
function go(tab){
  _tab=tab;
  document.querySelectorAll('.nb').forEach(function(b){b.classList.toggle('active',b.id==='nb-'+tab);});
  document.getElementById('scroll').scrollTop=0;
  render();
}
function render(){
  var el=document.getElementById('main');
  if(!el)return;
  var map={hud:rHUD,debts:rDebts,bills:rBills,money:rMoney,goals:rGoals,plan:rPlan,strategy:rStrategy,settings:rSettings,awards:rAwards};
  el.innerHTML=(map[_tab]||rHUD)();
  updateLvl();
}
function updateLvl(){
  var td=S.debts.reduce(function(s,d){return s+d.bal;},0);
  var to=S.debts.reduce(function(s,d){return s+d.orig;},0);
  var pct=to>0?Math.round((to-td)/to*100):0;
  var lv='LVL 1';
  if(pct>=10)lv='LVL 2';if(pct>=30)lv='LVL 3';if(pct>=60)lv='LVL 4';if(pct>=100)lv='LVL 5!';
  var el=document.getElementById('lvlBadge');
  if(el)el.textContent=lv;
}

// ── HELPERS ──
function ord(n){return n+(n===1?'st':n===2?'nd':n===3?'rd':'th');}
function priL(p){return p===1?'KILL FIRST':p===2?'KILL SECOND':p===3?'KILL LAST':'PRIORITY '+p;}
function priC(p){return p===1?'p1':p===2?'p2':p===3?'p3':'px';}
function fmtBal(n){return (n>=0?'$':'-$')+Math.abs(n).toFixed(2);}
function row(lbl,val,cls){return '<div class="irow"><span class="ilbl">'+lbl+'</span><span class="ival'+(cls?' '+cls:'')+'">'+val+'</span></div>';}
function xbar(pct,col,h){h=h||7;return '<div class="xtrack" style="height:'+h+'px"><div class="xfill '+col+'" style="width:'+pct+'%"></div></div>';}
function shead(title){return '<div class="sh"><div class="st">'+title+'</div></div>';}
function sheadbtn(title,cls,onclick,label){return '<div class="sh"><div class="st">'+title+'</div><button class="ab '+cls+'" onclick="'+onclick+'">'+label+'</button></div>';}

// ── UTILIZATION ──
function getUtil(){
  var cards=S.debts.filter(function(d){return d.type==='credit_card'&&d.limit>0&&!d.cleared;});
  if(!cards.length)return null;
  var bal=cards.reduce(function(s,d){return s+d.bal;},0);
  var lim=cards.reduce(function(s,d){return s+d.limit;},0);
  return lim>0?{pct:Math.round(bal/lim*100),bal:bal,lim:lim,cards:cards}:null;
}

// ── HUD ──
function rHUD(){
  var td=S.debts.reduce(function(s,d){return s+d.bal;},0);
  var to=S.debts.reduce(function(s,d){return s+d.orig;},0);
  var paid=Math.max(0,to-td);
  var dpct=to>0?Math.min(100,Math.round(paid/to*100)):0;
  var apt=S.goals.find(function(g){return g.name.indexOf('Apartment')!==-1;})||S.goals[0];
  var aptPct=apt?Math.min(100,Math.round(apt.cur/apt.tgt*100)):0;
  var cPct=Math.min(100,Math.max(0,Math.round((S.creditScore-300)/(Math.max(S.creditTarget,S.creditScore+1)-300)*100)));
  var bt=S.bills.reduce(function(s,b){return s+b.amt;},0);
  var left=S.income-bt-S.misc;
  var nw=S.accounts.reduce(function(s,a){return s+a.bal;},0);
  var now=new Date();

function rDebts(){
  var sorted=[].concat(S.debts).sort(function(a,b){return a.pri-b.pri;});
  var td=S.debts.reduce(function(s,d){return s+d.bal;},0);
  var ti=S.debts.reduce(function(s,d){return s+(d.apr/100/12*d.bal);},0);
  var util=getUtil();
  var h=sheadbtn('Debts','ar',"openAddDebt()",'+ Add');
  if(util){
    var uc=util.pct>=70?'var(--red)':util.pct>=30?'var(--amber)':'var(--green)';
    var um=util.pct>=70?'DANGER: Score is being crushed. Pay down NOW.':util.pct>=30?'WARNING: Above 30%. Score is being hurt.':'GOOD: Under 30%. Keep it here.';
    h+='<div class="card" style="border:1px solid '+uc+';margin-bottom:10px;">';
    h+='<div style="display:flex;justify-content:space-between;margin-bottom:7px;"><span style="font-family:var(--mono);font-size:10px;color:var(--muted);">CREDIT UTILIZATION</span><span style="font-family:var(--mono);font-size:18px;font-weight:700;color:'+uc+';">'+util.pct+'%</span></div>';
    h+=xbar(Math.min(100,util.pct),'xr',10);
    h+='<div style="font-size:11px;color:'+uc+';margin-bottom:5px;">'+um+'</div>';
    h+='<div style="font-size:10px;color:var(--muted);">Balance: $'+util.bal.toFixed(0)+' / Limit: $'+util.lim.toFixed(0)+'</div>';
    h+='</div>';
  }
  h+='<div class="ibar">'+row('Total balance','$'+td.toFixed(2),'mn')+row('Monthly interest burning','~$'+ti.toFixed(2),'mn')+'</div>';
  if(!sorted.length)return h+'<div class="empty"><strong>ALL DEBTS CLEARED</strong>Stack savings now.</div>';
  sorted.forEach(function(d){
    var mi=(d.apr/100/12*d.bal).toFixed(2);
    var pct=d.orig>0?Math.min(100,Math.round((d.orig-d.bal)/d.orig*100)):100;
    var xc=d.cleared?'xg':d.pri===1?'xr':d.pri===2?'xa':'xb';
    var tl={credit_card:'Credit Card',student_loan:'Student Loan',car_loan:'Car Loan',personal_loan:'Personal Loan',medical:'Medical',other:'Other'};

    h+='<span class="dpri '+priC(d.pri)+'">'+priL(d.pri)+'</span>';
    h+='<span style="font-size:10px;color:var(--muted);">'+(tl[d.type]||'Debt')+(d.limit?' | Limit $'+d.limit:'')+'</span>';
    h+='</div>';
    h+='<div class="dname">'+d.name+'</div>';
    h+='<div class="dmeta">APR '+d.apr+'% | Closes '+ord(d.close)+' | Due '+ord(d.due)+'</div>';
    h+='<div class="damts"><div class="dbal'+(d.cleared?' cv':'')+'">$'+d.bal.toFixed(2)+'</div><div class="drt"><div class="dint">~$'+mi+'/mo interest</div><div class="ddue">Due '+ord(d.due)+'</div></div></div>';
    h+=xbar(pct,xc);
    h+='<div style="font-size:9px;color:var(--muted);margin-top:3px;margin-bottom:6px;">'+pct+'% destroyed</div>';
    if(!d.cleared){
      h+='<div class="dacts">';
      h+='<button class="btn btn-r btn-sm" onclick="openPay('+d.id+')">Pay</button>';
      h+='<button class="btn btn-a btn-sm" onclick="openCharge('+d.id+')">Update</button>';
      h+='<button class="btn btn-s btn-sm" onclick="openEditDebt('+d.id+')">Edit</button>';
      h+='<button class="btn-del" onclick="delDebt('+d.id+')">Remove</button>';
      h+='</div>';
    }else{
      h+='<button class="btn-del" onclick="delDebt('+d.id+')">Remove</button>';
    }
    h+='</div>';
  });
  return h;
}

function saveDebt(){
  var name=document.getElementById('d-name').value.trim();
  var bal=parseFloat(document.getElementById('d-bal').value);
  var apr=parseFloat(document.getElementById('d-apr').value)||27;
  var close=parseInt(document.getElementById('d-close').value)||1;
  var due=parseInt(document.getElementById('d-due').value)||1;
  var pri=parseInt(document.getElementById('d-pri').value)||1;
  var limit=parseFloat(document.getElementById('d-limit').value)||0;
  var type=document.getElementById('d-type').value||'credit_card';
  if(!name||isNaN(bal)){toast('Enter name and balance','err');return;}
  if(_editDebtId!==null){
    var d=S.debts.find(function(x){return x.id===_editDebtId;});
    Object.assign(d,{name:name,bal:bal,apr:apr,close:close,due:due,pri:pri,limit:limit,type:type});
    if(bal===0)d.cleared=true;else d.cleared=false;
    toast('Updated: '+name);
  }else{
    S.debts.push({id:Date.now(),name:name,bal:bal,orig:bal,apr:apr,due:due,close:close,pri:pri,cleared:false,type:type,limit:limit,linkedDebtId:null});

    if(type==='credit_card'){S.accounts.push({id:Date.now()+1,name:name,type:'credit',bal:-bal,icon:'card',linkedDebtId:S.debts[S.debts.length-1].id});}
    toast('Tracking: '+name);
  }
  save();closeM('debt');render();
}

var CAT={needs:'Needs',wants:'Wants',transport:'Transport',subscriptions:'Subscriptions',debt:'Debt Payment',other_exp:'Other',paycheck:'Paycheck',side:'Side Income',other_inc:'Other Income'};
var EXP_C=['needs','wants','transport','subscriptions','debt','other_exp'];
var INC_C=['paycheck','side','other_inc'];
function rMoney(){
  var now=new Date();
  var mT=S.transactions.filter(function(t){var d=new Date(t.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  var cats=[['all','All'],['income','Income'],['expense','Expenses'],['needs','Needs'],['wants','Wants'],['transport','Transport'],['debt','Debt'],['paycheck','Paycheck']];
  var filtered;
  if(_filterCat==='all')filtered=mT;
  else if(_filterCat==='income')filtered=mT.filter(function(t){return INC_C.indexOf(t.cat)!==-1;});
  else if(_filterCat==='expense')filtered=mT.filter(function(t){return EXP_C.indexOf(t.cat)!==-1;});
  else filtered=mT.filter(function(t){return t.cat===_filterCat;});
  var tInc=mT.filter(function(t){return t.type==='income';}).reduce(function(s,t){return s+t.amt;},0);
  var tExp=mT.filter(function(t){return t.type==='expense';}).reduce(function(s,t){return s+t.amt;},0);
  var net=tInc-tExp;
  var h=sheadbtn('Money Tracker','ag',"openAddTxn()",'+ Add');
  h+='<div class="sgrid">';
  h+='<div class="sb2"><div class="sb2-l">Income</div><div class="sb2-v cg">$'+tInc.toFixed(0)+'</div><div class="sb2-s">this month</div></div>';
  h+='<div class="sb2"><div class="sb2-l">Expenses</div><div class="sb2-v cr">$'+tExp.toFixed(0)+'</div><div class="sb2-s">this month</div></div>';
  h+='<div class="sb2"><div class="sb2-l">Net Flow</div><div class="sb2-v '+(net>=0?'cg':'cr')+'">'+fmtBal(net)+'</div><div class="sb2-s">cashflow</div></div>';
  h+='<div class="sb2"><div class="sb2-l">Transactions</div><div class="sb2-v cb">'+mT.length+'</div><div class="sb2-s">this month</div></div>';
  h+='</div>';
  // Accounts
  h+=sheadbtn('Accounts','ab2',"openM('acct')",'+ Add');
  h+=rAccounts();
  // Filter pills
  h+=shead('Transactions');
  h+='<div class="cats">';
  cats.forEach(function(pair){h+='<button class="cpill'+((_filterCat===pair[0])?' on':'')+'" onclick="setFilter(\''+pair[0]+'\')">'+pair[1]+'</button>';});
  h+='</div>';
  // Transactions list
  var sorted=[].concat(filtered).sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  if(!sorted.length){h+='<div class="empty"><strong>NO TRANSACTIONS</strong>Tap + Add to log income or expenses</div>';}
  else{
    sorted.forEach(function(t){
      var bg=t.type==='income'?'var(--gd)':'var(--rd)';
      var ico=t.type==='income'?'$+':'$-';
      var cls=t.type==='income'?'inc':'exp';
      var sign=t.type==='income'?'+':'-';
      h+='<div class="txn">';
      h+='<div class="txn-ico" style="background:'+bg+'">'+ico+'</div>';
      h+='<div class="txn-info"><div class="txn-name">'+t.desc+'</div><div class="txn-meta">'+(CAT[t.cat]||t.cat)+' | '+t.date+'</div></div>';
      h+='<div class="txn-amt '+cls+'">'+sign+'$'+t.amt.toFixed(2)+'</div>';
      h+='<button class="txn-del" onclick="delTxn('+t.id+')">X</button>';
      h+='</div>';
    });
  }
  return h;
}
function rAccounts(){
  if(!S.accounts.length)return '<div class="empty"><strong>NO ACCOUNTS</strong>Tap + Add to track accounts</div>';
  var assets=S.accounts.filter(function(a){return a.bal>0;}).reduce(function(s,a){return s+a.bal;},0);
  var debts=S.accounts.filter(function(a){return a.bal<0;}).reduce(function(s,a){return s+Math.abs(a.bal);},0);

    var owed=Math.abs(a.bal).toFixed(2);

    h+='<div class="acct">';
    h+='<div class="acct-l"><div class="acct-ico" style="background:'+bg+'">$</div><div><div class="acct-name">'+a.name+'</div><div class="acct-type">'+a.type.toUpperCase()+'</div></div></div>';
    h+='<div style="display:flex;align-items:center;gap:6px;">';
    h+='<div class="acct-bal '+balColor+'">'+prefix+owed+'</div>';

    h+='</div></div>';
  });
  h+='<div class="ibar" style="margin-top:4px;">';
  h+=row('Total assets','$'+assets.toFixed(2),'pl');
  h+=row('Total debt','$'+debts.toFixed(2),'mn');
  h+=row('Net worth',(assets-debts>=0?'$':'-$')+Math.abs(assets-debts).toFixed(2),(assets-debts>=0?'pl hi':'mn hi'));
  h+='</div>';

}

function saveTxn(){
  var desc=document.getElementById('t-desc').value.trim();
  var amt=parseFloat(document.getElementById('t-amt').value);
  var date=document.getElementById('t-date').value||new Date().toISOString().split('T')[0];
  var cat=document.getElementById('t-cat').value;
  var acctVal=document.getElementById('t-acct').value;
  if(!desc||isNaN(amt)||amt<=0){toast('Fill in description and amount','err');return;}
  var acctId=null,debtId=null;
  if(acctVal.indexOf('debt_')===0){debtId=parseInt(acctVal.replace('debt_',''));}
  else if(acctVal){acctId=parseInt(acctVal);}
  S.transactions.push({id:Date.now(),desc:desc,amt:amt,type:_txnType,cat:cat,date:date,acctId:acctId,debtId:debtId});
  if(acctId){var a=S.accounts.find(function(x){return x.id===acctId;});if(a){if(_txnType==='income')a.bal=+(a.bal+amt).toFixed(2);else a.bal=+(a.bal-amt).toFixed(2);}}

function rPlan(){
  var done=S.planItems.filter(function(p){return p.done;}).length;
  var total=S.planItems.length;
  var pct=total?Math.round(done/total*100):0;
  var PC={high:'var(--red)',medium:'var(--amber)',low:'var(--green)'};
  var sorted=[].concat(S.planItems).sort(function(a,b){if(a.done!==b.done)return a.done?1:-1;var po={high:0,medium:1,low:2};return(po[a.pri]||1)-(po[b.pri]||1);});
  var h=sheadbtn('Action Plan','ap',"openAddPlan()",'+ Add');
  h+='<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">';
  h+='<div style="flex:1;">'+xbar(pct,'xg')+'<div style="font-size:10px;color:var(--muted);">'+done+'/'+total+' completed</div></div>';
  h+='<div style="font-size:20px;font-weight:700;color:var(--green);">'+pct+'%</div></div>';
  if(!sorted.length)return h+'<div class="empty"><strong>NO ITEMS</strong>Tap + Add to build your plan</div>';
  sorted.forEach(function(p){
    h+='<div class="pitem'+(p.done?' done':'')+'">';
    h+='<div class="pnum'+(p.done?' dn':'')+'">'+(p.done?'&#10003;':'')+'</div>';
    h+='<div class="ptxt"><strong>'+p.title+'</strong><span>'+(p.desc||'')+'</span>';
    h+='<div class="pbtns"><button class="btn btn-s btn-sm" onclick="togglePlan('+p.id+')">'+(p.done?'Undo':'Done')+'</button><button class="btn btn-s btn-sm" onclick="openEditPlan('+p.id+')">Edit</button><button class="btn-del" onclick="delPlan('+p.id+')">Remove</button></div>';
    h+='</div>';
    h+='<div class="pmeta"><div class="pdate">'+(p.date||'')+'</div><div class="pdot" style="background:'+(PC[p.pri]||'var(--muted)')+'"></div></div>';

}

  {id:'credit_700',icon:'&#11088;',title:'Good Standing',desc:'Credit score reached 700',check:function(){return S.creditScore>=700;}},
  {id:'credit_740',icon:'&#128142;',title:'Excellent Credit',desc:'Credit score reached 740+',check:function(){return S.creditScore>=740;}},
  {id:'util_30',icon:'&#128737;',title:'Under Control',desc:'Credit utilization below 30%',check:function(){var u=getUtil();return u?u.pct<30:false;}},
  {id:'first_txn',icon:'&#128221;',title:'Tracker Activated',desc:'Log your first transaction',check:function(){return S.transactions.length>=1;}},
  {id:'net_positive',icon:'&#128202;',title:'Net Positive',desc:'Achieve a positive net worth',check:function(){return S.accounts.reduce(function(s,a){return s+a.bal;},0)>0;}},
  {id:'plan_5',icon:'&#9989;',title:'Action Taker',desc:'Complete 5 plan items',check:function(){return S.planItems.filter(function(p){return p.done;}).length>=5;}},
  {id:'plan_all',icon:'&#127937;',title:'Plan Complete',desc:'Complete all plan items',check:function(){return S.planItems.length>0&&S.planItems.every(function(p){return p.done;});}}
];
function checkAwards(){
  var newOnes=[];
  AWARDS.forEach(function(a){
    if(S.achievements.indexOf(a.id)===-1&&a.check()){S.achievements.push(a.id);newOnes.push(a);}
  });
  if(newOnes.length){lSave();newOnes.forEach(function(a,i){setTimeout(function(){toast('Award Unlocked: '+a.icon+' '+a.title);},i*2500);});}
}
function rAwards(){
  var earned=S.achievements;var total=AWARDS.length;var pct=total?Math.round(earned.length/total*100):0;
  var h=shead('Awards ('+earned.length+'/'+total+')');
  h+='<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">';
  h+='<div style="flex:1;">'+xbar(pct,'xp')+'<div style="font-size:10px;color:var(--muted);">'+earned.length+' of '+total+' unlocked</div></div>';
  h+='<div style="font-size:20px;font-weight:700;color:var(--purple);">'+pct+'%</div></div>';
  AWARDS.forEach(function(a){
    var isEarned=earned.indexOf(a.id)!==-1;
    h+='<div class="ach-item'+(isEarned?' earned':'')+'" style="opacity:'+(isEarned?'1':'0.45')+'">';
    h+='<div style="font-size:28px;line-height:1;">'+(isEarned?a.icon:'&#128274;')+'</div>';
    h+='<div style="flex:1;"><div style="font-size:13px;font-weight:600;color:'+(isEarned?'var(--text)':'var(--muted)')+';">'+a.title+'</div>';
    h+='<div style="font-size:11px;color:var(--muted);margin-top:2px;">'+a.desc+'</div></div>';
    if(isEarned)h+='<div style="font-size:10px;color:var(--green);">EARNED</div>';
    h+='</div>';
  });
  return h;
}

// ── SETTINGS ──
function rSettings(){
  var h=shead('Settings');
  h+='<div class="card">';
  h+='<div style="font-size:9px;color:var(--blue);margin-bottom:10px;">PROFILE</div>';
  h+='<div class="sett" onclick="openM(\'income\')"><div><div class="sett-l">Income and Paycheck</div><div class="sett-s">$'+S.income+'/mo | $'+S.paycheck+' biweekly</div></div><span class="sett-ch">></span></div>';
  h+='<div class="sett" onclick="openM(\'credit\')"><div><div class="sett-l">Credit Score</div><div class="sett-s">'+S.creditScore+' to target '+S.creditTarget+'</div></div><span class="sett-ch">></span></div>';
  h+='</div>';
  h+='<div class="card">';
  h+='<div style="font-size:9px;color:var(--red);margin-bottom:10px;">SECURITY</div>';
  h+='<div class="sett" onclick="openM(\'pin\')"><div><div class="sett-l">Change PIN</div><div class="sett-s">Tap to update your 4-digit PIN</div></div><span class="sett-ch">></span></div>';
  h+='<div class="sett"><div><div class="sett-l">Auto-Lock</div><div class="sett-s">Lock after inactivity</div></div><button class="tog '+(S.autoLock?'on':'off')+'" onclick="toggleLock()"></button></div>';
  h+='<div class="sett"><div><div class="sett-l">Lock Timer</div><div class="sett-s">'+(S.lockMins||5)+' minutes</div></div><select class="fs" style="width:85px;font-size:11px;" onchange="setLockMins(this.value)">';
  [1,2,5,10,15,30].forEach(function(m){h+='<option value="'+m+'"'+((S.lockMins||5)===m?' selected':'')+'>'+m+' min</option>';});
  h+='</select></div>';
  h+='<div class="sett" onclick="lockApp()"><div><div class="sett-l">Lock Now</div><div class="sett-s">Immediately lock the app</div></div><span class="sett-ch">></span></div>';
  h+='</div>';
  h+='<div class="card">';
  h+='<div style="font-size:9px;color:var(--amber);margin-bottom:10px;">DATA</div>';
  h+='<div class="sett" onclick="exportData()"><div><div class="sett-l">Export Backup</div><div class="sett-s">Download your data as JSON</div></div><span class="sett-ch">></span></div>';
  h+='<div class="sett" onclick="importData()"><div><div class="sett-l">Import Backup</div><div class="sett-s">Restore from a JSON file</div></div><span class="sett-ch">></span></div>';
  h+='<div class="sett" onclick="resetBills()"><div><div class="sett-l" style="color:var(--amber);">Reset Bills - New Month</div><div class="sett-s">Mark all bills unpaid</div></div><span class="sett-ch">></span></div>';
  h+='<div class="sett" onclick="clearTxns()"><div><div class="sett-l" style="color:var(--amber);">Clear All Transactions</div><div class="sett-s">Remove transaction history</div></div><span class="sett-ch">></span></div>';
  h+='</div>';
  h+='<div class="danger"><div style="font-size:9px;color:var(--red);margin-bottom:8px;">DANGER ZONE</div><button class="btn btn-r btn-full" onclick="resetAll()">Reset Everything</button></div>';
  h+='<div style="text-align:center;margin-top:16px;font-size:9px;color:var(--dim);">Finance Quest v4.0 | Built for Ralique | PIN protected</div>';
  return h;
}
function toggleLock(){S.autoLock=!S.autoLock;save();render();}
function setLockMins(v){S.lockMins=parseInt(v)||5;save();render();}
function resetBills(){if(!confirm('Mark all bills unpaid?'))return;S.bills.forEach(function(b){b.paid=false;});save();render();toast('Bills reset for new month');}
function clearTxns(){if(!confirm('Delete all transactions?'))return;S.transactions=[];save();render();toast('Transactions cleared');}
function resetAll(){if(!confirm('RESET EVERYTHING?'))return;if(!confirm('100% sure? All data lost.'))return;S=JSON.parse(JSON.stringify(DEF));lSave();render();toast('App reset');}
function exportData(){var blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='finance-quest-backup-'+new Date().toISOString().split('T')[0]+'.json';a.click();toast('Backup downloaded!');}
function importData(){var input=document.createElement('input');input.type='file';input.accept='.json';input.onchange=function(e){var fr=new FileReader();fr.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(!d.name||!d.debts)throw new Error();S=d;lSave();render();toast('Data imported!');}catch(ex){toast('Invalid backup file','err');}};fr.readAsText(e.target.files[0]);};input.click();}

// ── INCOME / CREDIT SAVE ──
function saveIncome(){var inc=parseFloat(document.getElementById('i-inc').value);var pay=parseFloat(document.getElementById('i-pay').value);var misc=parseFloat(document.getElementById('i-misc').value);if(!isNaN(inc)&&inc>0)S.income=inc;if(!isNaN(pay)&&pay>0)S.paycheck=pay;if(!isNaN(misc)&&misc>=0)S.misc=misc;save();closeM('income');render();toast('Income updated!');}
function saveCredit(){var sc=parseInt(document.getElementById('c-sc').value);var tg=parseInt(document.getElementById('c-tgt').value);if(!isNaN(sc)&&sc>=300&&sc<=850)S.creditScore=sc;if(!isNaN(tg)&&tg>=300&&tg<=850)S.creditTarget=tg;save();closeM('credit');render();toast('Score updated: '+S.creditScore);checkAwards();}

// ── MODALS ──
function openM(id){
  if(id==='income'){document.getElementById('i-inc').value=S.income;document.getElementById('i-pay').value=S.paycheck;document.getElementById('i-misc').value=S.misc;}
  if(id==='credit'){document.getElementById('c-sc').value=S.creditScore;document.getElementById('c-tgt').value=S.creditTarget;}
  var el=document.getElementById('m-'+id);if(el)el.classList.add('open');
}
function closeM(id){var el=document.getElementById('m-'+id);if(el)el.classList.remove('open');}
document.querySelectorAll('.ov').forEach(function(el){el.addEventListener('click',function(e){if(e.target===el){var id=el.id.replace('m-','');closeM(id);}});});

// ── TOAST ──
function toast(msg,type){
  var t=document.getElementById('toast');var m=document.getElementById('toast-msg');
  if(!t||!m)return;
  m.textContent=msg;t.className='toast'+(type==='err'?' err':'');t.classList.add('show');
  clearTimeout(_toastTimer);_toastTimer=setTimeout(hideToast,4000);
}
function hideToast(){var t=document.getElementById('toast');if(t)t.classList.remove('show');clearTimeout(_toastTimer);}

// ── INIT ── runs last, after all functions defined
lLoad();
(function(){var el=document.getElementById('pinSub');if(el)el.textContent=localStorage.getItem('fq6')?'ENTER YOUR PIN':'DEFAULT PIN: 1234  (change in Settings)';})();
</script>
